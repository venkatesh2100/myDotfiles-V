general {
    lock_cmd         = pidof hyprlock || hyprlock   # prevents double hyprlock instances
    before_sleep_cmd = loginctl lock-session         # locks via dbus before suspend
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# 1. Lock after 30s idle
listener {
    timeout  = 30
    on-timeout = loginctl lock-session
}

# 2. Displays off after 60s idle
listener {
    timeout  = 60
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# 3. Suspend after 120s idle
listener {
    timeout  = 120
    on-timeout = systemctl suspend        # correct — works from active user session
    on-resume  = hyprctl dispatch dpms on
}
