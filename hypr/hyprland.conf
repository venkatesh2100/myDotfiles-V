## My Addons Extra
# source ~/.config/hypr/keybindings.conf
source = /home/venky/.config/hypr/keybinds.conf
# globalscale = 1.0
# xwayland-force-scale = 1.0
# If you prefer to use the default settings, comment out the two lines above
# and uncomment the line below
# monitor=,preferred,auto,1  # Default monitor settings





source = ~/.config/hypr/macchiato.conf
# exec-once = colormgr device-add-profile ... sRGB.icc
# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    repeat_rate  = 35
    repeat_delay = 250
    accel_profile = adaptive

    touchpad {
        natural_scroll = false
        tap-and-drag   = true
        scroll_factor = 0.85
        drag_lock      = true
    }
}
# XWayland disable scaling
xwayland {
    force_zero_scaling = true
}

env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
# env = GDK_SCALE, 1.6
# env = HYPRCURSOR_THEME,Catppuccin-Macchiato-Teal
# env = HYPRCURSOR_SIZE,24
# env = XCURSOR_THEME,Catppuccin-Macchiato-Teal
# env = XCURSOR_SIZE,24

env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
general {
    gaps_in = 2
    gaps_out = 8
    border_size = 1
    col.inactive_border = rgb(1e2030)
    col.active_border = $surface1

   layout = dwindle
    # layout = master
}

decoration {
    rounding = 10

    blur {
        new_optimizations = true
        size = 6
        passes = 2
        xray = false
        noise = 0.0117
        contrast = 0.8916
        brightness = 0.8172
        special = false
    }

    # shadow {
    #     enabled = true 
    #     range = 15
    #     render_power = 3
    #     offset = 0, 0
    #     color = $teal
    #     color_inactive = 0xff$baseAlpha
    # }

    active_opacity = 0.9
    inactive_opacity = 0.8
    fullscreen_opacity = 1
}

layerrule = blur, logout_dialog

# animations {
#     bezier = smoothOut, 0.36, 0, 0.66, -0.56
#     bezier = smoothIn,  0.25, 1, 0.5,  1
#     bezier = overshot,  0.05, 0.9, 0.1, 1.05
#
#     animation = windows,          1, 3, overshot,  slide
#     animation = windowsOut,       1, 2, smoothOut, slide
#     animation = windowsMove,      1, 3, smoothIn
#     animation = border,           1, 5, default
#     animation = borderangle,      1, 8, default
#     animation = fade,             1, 3, smoothIn
#     animation = workspaces,       1, 3, smoothIn,  slidevert
#     animation = specialWorkspace, 1, 3, smoothIn,  slidefadevert
# }
animations {
    enabled = true

    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn,  0.25, 1, 0.5,  1
    bezier = overshot,  0.05, 0.9, 0.1, 1.05

    animation = windows,          1, 3, overshot,  slide
    animation = windowsOut,       1, 2, smoothOut, slide
    animation = windowsMove,      1, 3, smoothIn
    animation = border,           1, 5, default
    animation = borderangle,      1, 8, default
    animation = fade,             1, 3, smoothIn
    animation = workspaces,       1, 3, smoothIn,  slidevert
    animation = specialWorkspace, 1, 3, smoothIn,  slidefadevert
}
dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
    smart_split = true
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_status = master
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    # workspace_swipe = on
}

misc {
    disable_hyprland_logo = true
    # disable_splash_rendering = true
    vfr = true
    vrr = 2
    allow_session_lock_restore = true
    # background_color = 0x24273a
}

binds {
    workspace_back_and_forth = true
}

# Example per-device config
device {
    name = epic mouse V1
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Make Firefox window transparent
windowrulev2 = opacity 0.9 0.9, class:^(firefox-esr)$
windowrulev2 = opacity 0.9 0.9, class:^(org.kde.dolphin)$
windowrulev2 = float,        title:^(.*mpv.*)$
windowrulev2 = opaque,       title:^(.*mpv.*)$
windowrulev2 = size 95% 75%, title:^(.*mpv.*)$
windowrulev2 = idleinhibit focus, title:^(.*mpv.*)$

# video content
windowrulev2 = float,        content:^(video)$
windowrulev2 = opaque,       content:^(video)$
windowrulev2 = size 95% 75%, content:^(video)$

# imv / photos
windowrulev2 = float,        title:^(.*imv.*)$
windowrulev2 = opaque,       title:^(.*imv.*)$
windowrulev2 = size 70% 70%, title:^(.*imv.*)$
windowrulev2 = float,        content:^(photo)$
windowrulev2 = opaque,       content:^(photo)$
windowrulev2 = size 70% 70%, content:^(photo)$

# PDF
windowrulev2 = float,    title:^(.*\.pdf)$
windowrulev2 = opaque,   title:^(.*\.pdf)$
windowrulev2 = maximize, title:^(.*\.pdf)$

# misc
windowrulev2 = opaque,       title:^(.*YouTube - Brave.*)$
windowrulev2 = opaque,       title:^(swappy)$
windowrulev2 = center,       title:^(swappy)$
windowrulev2 = stayfocused,  title:^(swappy)$
windowrulev2 = opaque,       class:^(TelegramDesktop)$
windowrulev2 = float,        class:^(nm-connection-editor)$

