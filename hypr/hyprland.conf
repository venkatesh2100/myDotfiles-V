## My Addons Extra
# source ~/.config/hypr/keybindings.conf
source = /home/venky/.config/hypr/keybinds.conf
# globalscale = 1.0
# xwayland-force-scale = 1.0
# If you prefer to use the default settings, comment out the two lines above
# and uncomment the line below
# monitor=,preferred,auto,1  # Default monitor settings





source = ~/.config/hypr/macchiato.conf

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    # kb_variant =
    # kb_model =
    # kb_rules =
    repeat_rate  = 35
    repeat_delay = 250
    accel_profile = adaptive
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
        tap-and-drag = true
        scroll_factor = 0.85
        drag_lock      = true
    }

}

# XWayland disable scaling
xwayland {
    force_zero_scaling = true
}

# env = GDK_SCALE, 1.6
# env = HYPRCURSOR_THEME,Catppuccin-Macchiato-Teal
# env = HYPRCURSOR_SIZE,24
# env = XCURSOR_THEME,Catppuccin-Macchiato-Teal
# env = XCURSOR_SIZE,24

env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
general {
    gaps_in = 2
    gaps_out = 8
    border_size = 1
    col.inactive_border = $mantleAlpha
    col.active_border = $surface1

    layout = dwindle
    # layout = master
}

decoration {
    rounding = 10
    # active_opacity = 0.9
    # inactive_opacity = 0.8
    # fullscreen_opacity = 1
    blur {
        enabled = true
        new_optimizations = true
        # size = 6
        # passes = 2
        # xray = false
        # noise = 0.0117
        # contrast = 0.8916
        # brightness = 0.8172
        # special = false
    }

    shadow {
        enabled = true 
        range =4
        render_power = 5
        # ignore_window = false
        offset = 0, 0
        color = $overlay1
        color_inactive = 0xff$baseAlpha
    }


    # active_opacity = 1
    # inactive_opacity = 0.8
    # fullscreen_opacity = 0.9
}

layerrule = blur, logout_dialog
# layerrule = blur , rofi
animations {
    enabled = true

    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn,  0.25, 1, 0.5,  1
    bezier = overshot,  0.05, 0.9, 0.1, 1.05

    animation = windows,          1, 3, overshot,  slide
    animation = windowsOut,       1, 2, smoothOut, slide
    animation = windowsMove,      1, 2, smoothIn
    animation = border,           1, 4, default
    animation = borderangle,      1, 6, default
    animation = fade,             1, 2, smoothIn
    animation = workspaces,       1, 3 , smoothIn,  slidevert
    animation = specialWorkspace, 1, 2, smoothIn,  slidefadevert
}
# animations {
#     enabled = true
#
#     # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
