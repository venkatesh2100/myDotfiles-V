

#autogenerated = 1 # remove this line to remove the warning

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = xdg-desktop-portal-hyprland &
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,preferred,auto,1.25  # Settings for the internal monitor
monitor=HDMI-A-1,1920x1080@180,auto-left,1  # Settings for the external monitor
# Rotate monitor
monitor = eDP-1, transform, 0    # 0=normal, 1=90°, 2=180°, 3=270°
monitor = HDMI-A-1, transform, 0    # 0=normal, 1=90°, 2=180°, 3=270°
# monitor = HDMI-A-1, 1080x1920@180, 1536x0, 1, transform, 1
# exec-once = hyprpaper
exec-once = wl-paste  --watch cliphist store
# exec-once = swaybg -i ~/Pictures/walls/solar.png -m fill &
exec-once = ~/myDotfiles-V/scripts/wallpaper.sh restore
# exec-once = ~/myDotfiles-v/scripts/cycle_wall.sh
exec-once = wl-gammarelay
exec-once = waybar &
exec-once = pkill dnust; dunst -config ~/.config/dunst/dunstrc
workspace = name:dynamic_monitor, monitor:^focused
# exec-once = powerprofilesctl set performance
# exec-once = bash -c "swayidle -w timeout 5 'hyprlock'"
exec-once = xrdb -merge ~/.Xresources
exec-once = hypridle
env = LIBVA_DRIVER_NAME,iHD
env = VDPAU_DRIVER,va_gl
env = __GLX_VENDOR_LIBRARY_NAME,mesa
env = WLR_RENDERER,vulkan
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
